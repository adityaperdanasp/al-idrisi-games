<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Guru — Al Idrisi Games</title>
<meta name="theme-color" content="#fdedd3">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="db-page">

  <div id="db-gate" class="db-gate">
    <div class="db-gate-card">
      <h1>Dashboard Guru</h1>
      <p>Masukkan PIN untuk lanjut</p>
      <input id="pin-input" class="db-pin-input" inputmode="numeric" autocomplete="off" maxlength="6" placeholder="••••">
      <button id="pin-submit" class="db-btn-primary">Masuk</button>
      <div id="pin-error" class="db-error hidden">PIN salah, coba lagi.</div>
    </div>
  </div>

  <div id="db-app" class="db-app hidden">
    <header class="db-header">
      <a href="../index.html" class="db-back" title="Kembali ke hub">←</a>
      <h1>Dashboard Guru</h1>
      <button id="db-refresh" class="db-refresh-btn" title="Muat ulang data">🔄 Refresh</button>
    </header>
    <div id="db-updated" class="db-updated"></div>

    <nav class="db-tabs">
      <button class="db-tab active" data-tab="students">Progress Murid</button>
      <button class="db-tab" data-tab="approvals">Persetujuan Ortu</button>
    </nav>

    <section id="tab-students" class="db-tab-panel">
      <div class="db-table-wrap">
        <table class="db-table">
          <thead>
            <tr>
              <th>Murid</th>
              <th>Math Race</th>
              <th>Language Arts</th>
              <th>SolarQuest</th>
              <th>Area lemah (top)</th>
            </tr>
          </thead>
          <tbody id="student-tbody"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-approvals" class="db-tab-panel hidden">
      <h2>Menunggu persetujuan</h2>
      <div id="pending-list" class="db-insight-list"></div>
      <h2>Sudah disetujui — siap dikirim ke ortu</h2>
      <div id="approved-list" class="db-insight-list"></div>
    </section>
  </div>

  <div id="student-detail-overlay" class="db-overlay hidden">
    <div class="db-detail-card">
      <button id="detail-close" class="db-close">✕</button>
      <div id="detail-content"></div>
    </div>
  </div>

</div>

<script src="../player.js"></script>
<script src="../players.js"></script>
<script src="../leaderboard.js"></script>
<script src="config.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
