<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Al Idrisi Games</title>
<meta name="theme-color" content="#1266d8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="hub">
  <header class="hub-header">
    <h1 class="hub-title">Al Idrisi Games</h1>
    <p class="hub-subtitle">Choose your game</p>
  </header>

  <div class="game-grid">
    <a class="game-card" href="multipleazka/">
      <img class="game-icon" src="multipleazka/icon-512.png" alt="">
      <span class="game-name">Math Race</span>
      <span class="game-desc">Pick who's playing, then race!</span>
    </a>
    <a class="game-card" href="azkacraft/">
      <img class="game-icon" src="azkacraft/icons/icon-512.png" alt="">
      <span class="game-name">Language &amp; Arts</span>
      <span class="game-desc">A Storybook Language &amp; Arts</span>
    </a>
    <a class="game-card" href="azkauniverse/">
      <img class="game-icon" src="azkauniverse/icon-512.png" alt="">
      <span class="game-name">SolarQuest</span>
      <span class="game-desc">AI Science Adventure</span>
    </a>
  </div>
</main>

</body>
</html>
