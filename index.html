<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Al Idrisi Games</title>
<meta name="theme-color" content="#55b9f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Al Idrisi Games">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="hub">
  <div class="hero-stage">
    <img class="hero-img" src="hero.png" alt="Al Idrisi Games">
    <div class="hero-fade"></div>
    <div class="hero-cards">
      <a class="game-bar" href="multipleazka/">
        <img src="multipleazka/icon-512.png" alt="">
        <span class="txt">
          <span class="n">Math Race</span>
          <span class="d">Pick who's playing, then race!</span>
        </span>
      </a>
      <a class="game-bar" href="azkacraft/">
        <img src="azkacraft/icons/icon-512.png" alt="">
        <span class="txt">
          <span class="n">Language &amp; Arts</span>
          <span class="d">A Storybook Language &amp; Arts</span>
        </span>
      </a>
      <a class="game-bar" href="azkauniverse/">
        <img src="azkauniverse/icon-512.png" alt="">
        <span class="txt">
          <span class="n">SolarQuest</span>
          <span class="d">AI Science Adventure</span>
        </span>
      </a>
    </div>
  </div>
  <div class="filler"></div>
</main>

</body>
</html>
