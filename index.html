<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Al Idrisi Games</title>
<meta name="theme-color" content="#55b9f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Al Idrisi Games">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Hub's own Firebase project: shared leaderboard/player data + Analytics -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
</head>
<body>

<main class="hub">
  <a href="leaderboard.html" class="leaderboard-btn" title="Leaderboard">🏆</a>
  <button id="switch-player-btn" class="switch-player-btn hidden">
    👤 <span id="current-player-name"></span>
  </button>

  <div class="hero-stage">
    <img class="hero-img" src="hero.png" alt="Al Idrisi Games">
    <div class="hero-fade"></div>
    <div class="hero-cards">
      <a class="game-bar" href="multipleazka/">
        <img src="multipleazka/icon-512.png" alt="">
        <span class="txt">
          <span class="n">Math Race</span>
          <span class="d">Pick who's playing, then race!</span>
        </span>
      </a>
      <a class="game-bar" href="azkacraft/">
        <img src="azkacraft/icons/icon-512.png" alt="">
        <span class="txt">
          <span class="n">Language &amp; Arts</span>
          <span class="d">A Storybook Language &amp; Arts</span>
        </span>
      </a>
      <a class="game-bar" href="azkauniverse/">
        <img src="azkauniverse/icon-512.png" alt="">
        <span class="txt">
          <span class="n">SolarQuest</span>
          <span class="d">AI Science Adventure</span>
        </span>
      </a>
    </div>
  </div>
  <div class="filler"></div>
</main>

<!-- Player picker overlay — shown until a name is chosen, reopenable via
     the "switch player" button once dismissed. -->
<div id="player-picker" class="player-picker">
  <div class="picker-card">
    <h1 class="picker-title">Siapa yang main?</h1>
    <p class="picker-sub">Pilih namamu dulu ya!</p>

    <div class="picker-section-label">Guru</div>
    <div class="picker-grid teachers" id="picker-teachers"></div>

    <div class="picker-section-label">Murid</div>
    <div class="picker-grid students" id="picker-students"></div>
  </div>
</div>

<script src="player.js"></script>
<script src="players.js"></script>
<script src="firebase.js"></script>
<script>
  function renderPicker() {
    const teachersEl = document.getElementById("picker-teachers");
    const studentsEl = document.getElementById("picker-students");
    teachersEl.innerHTML = "";
    studentsEl.innerHTML = "";
    window.AIG_PLAYERS.forEach(p => {
      const btn = document.createElement("button");
      btn.className = "picker-btn " + p.role;
      btn.textContent = p.name;
      btn.addEventListener("click", () => selectPlayer(p));
      (p.role === "teacher" ? teachersEl : studentsEl).appendChild(btn);
    });
  }

  function selectPlayer(p) {
    AIGPlayer.setPlayer(p);
    closePicker();
  }

  function closePicker() {
    document.getElementById("player-picker").classList.add("hidden");
    updateSwitchBtn();
  }

  function openPicker() {
    document.getElementById("player-picker").classList.remove("hidden");
  }

  function updateSwitchBtn() {
    const btn = document.getElementById("switch-player-btn");
    const nameEl = document.getElementById("current-player-name");
    const current = AIGPlayer.getPlayer();
    if (current) {
      nameEl.textContent = current.name;
      btn.classList.remove("hidden");
    } else {
      btn.classList.add("hidden");
    }
  }

  renderPicker();
  if (AIGPlayer.getPlayer()) {
    document.getElementById("player-picker").classList.add("hidden");
  }
  updateSwitchBtn();
  document.getElementById("switch-player-btn").addEventListener("click", openPicker);
</script>

</body>
</html>
